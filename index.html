<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C8102E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HW Scanner">
<title>Hot Wheels AI Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red: #C8102E;
  --red-dark: #9B0C22;
  --red-light: #FF1A3C;
  --yellow: #FFD700;
  --yellow-dark: #B8960A;
  --bg: #0A0A0A;
  --surface: #141414;
  --surface2: #1E1E1E;
  --surface3: #282828;
  --border: rgba(255,255,255,0.08);
  --text: #F5F5F5;
  --text2: #999;
  --text3: #555;
  --green: #22C55E;
  --green-bg: rgba(34,197,94,0.12);
  --amber: #F59E0B;
  --amber-bg: rgba(245,158,11,0.12);
  --blue: #3B82F6;
  --blue-bg: rgba(59,130,246,0.12);
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
}

/* Header */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
  flex-shrink: 0;
}

.hw-logo {
  width: 36px;
  height: 36px;
  background: var(--red);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.hw-logo svg { width: 22px; height: 22px; fill: white; }

.header-text {}
.header-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 0.5px;
  color: var(--text);
  line-height: 1;
  text-transform: uppercase;
}
.header-subtitle {
  font-size: 11px;
  color: var(--text2);
  margin-top: 2px;
  letter-spacing: 0.3px;
}

/* Main scroll area */
.main {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 16px calc(var(--safe-bottom) + 16px);
}

/* Upload section */
.section-label {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
}

.photo-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.photo-zone {
  display: flex;
  background: var(--surface);
  border: 1.5px dashed var(--surface3);
  border-radius: 12px;
  min-height: 160px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.photo-zone:active { opacity: 0.8; }
.photo-zone.filled { border-style: solid; border-color: var(--red); }

.photo-zone input[type=file] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  font-size: 0;
}

.photo-zone img.preview {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 6px;
}

.zone-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 16px 12px;
  pointer-events: none;
}

.zone-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
}

.zone-icon svg { width: 20px; height: 20px; fill: var(--text3); }

.zone-label {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  letter-spacing: 0.3px;
  text-align: center;
  text-transform: uppercase;
}

.zone-hint {
  font-size: 11px;
  color: var(--text3);
  text-align: center;
}

.remove-btn {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 24px;
  height: 24px;
  background: rgba(0,0,0,0.7);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50%;
  color: var(--text);
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

/* Scan button */
.scan-btn {
  width: 100%;
  height: 52px;
  background: var(--red);
  color: white;
  border: none;
  border-radius: 12px;
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 20px;
  -webkit-tap-highlight-color: transparent;
}

.scan-btn:active { background: var(--red-dark); }
.scan-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.scan-btn svg { width: 20px; height: 20px; fill: white; }

/* Loading */
.loading-box {
  background: var(--surface);
  border-radius: 12px;
  padding: 28px 20px;
  text-align: center;
  border: 1px solid var(--border);
  margin-bottom: 16px;
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--surface3);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
  margin: 0 auto 14px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text);
  margin-bottom: 4px;
}

.loading-sub { font-size: 13px; color: var(--text2); }

/* Result sections */
.result-block { margin-bottom: 12px; }

.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.car-hero {
  background: linear-gradient(135deg, #1A0008 0%, #2A0010 60%, #1A0008 100%);
  padding: 18px 16px 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.car-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--red);
}

.car-num-badge {
  display: inline-block;
  background: var(--red);
  color: white;
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 6px;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.car-model-name {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 800;
  color: white;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  line-height: 1;
  margin-bottom: 6px;
}

.car-series {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.badge-pill {
  font-size: 10px;
  font-weight: 600;
  font-family: var(--font-display);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 20px;
}

.badge-th { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
.badge-sth { background: rgba(255,215,0,0.12); color: var(--yellow); border: 1px solid rgba(255,215,0,0.3); }
.badge-new { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }

.fields-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
}

.field-item {
  padding: 12px 14px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.field-item:nth-child(even) { border-right: none; }
.field-item:last-child, .field-item.full-width { grid-column: 1 / -1; border-right: none; }

.field-key {
  font-size: 10px;
  font-weight: 600;
  font-family: var(--font-display);
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  margin-bottom: 4px;
}

.field-val {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}

.field-na {
  font-size: 13px;
  color: var(--text3);
  font-style: italic;
}

/* Market value */
.market-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.market-header {
  background: var(--green-bg);
  border-bottom: 1px solid rgba(34,197,94,0.15);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.market-icon {
  width: 36px;
  height: 36px;
  background: var(--green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 800;
  color: #0A0A0A;
  flex-shrink: 0;
}

.market-title {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--green);
  margin-bottom: 2px;
}

.market-range {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 800;
  color: white;
}

.market-body { padding: 14px 16px; }

.market-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.market-row:last-child { border-bottom: none; }

.market-label { font-size: 13px; color: var(--text2); }
.market-amount { font-size: 14px; font-weight: 600; color: var(--text); }

.confidence-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 4px;
}

.conf-high { background: var(--green); }
.conf-medium { background: var(--amber); }
.conf-low { background: var(--red); }

.market-note-box {
  margin-top: 10px;
  background: var(--surface2);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.5;
}

/* Notes */
.notes-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
}

.notes-title {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  margin-bottom: 8px;
}

.notes-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}

/* Actions */
.action-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 12px;
}

.action-btn {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}

.action-btn:active { background: var(--surface2); }
.action-btn svg { width: 16px; height: 16px; fill: currentColor; }
.action-btn.primary { background: var(--yellow); color: #0A0A0A; border-color: var(--yellow); }
.action-btn.primary:active { background: var(--yellow-dark); }

/* Error */
.error-box {
  background: rgba(200,16,46,0.1);
  border: 1px solid rgba(200,16,46,0.3);
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 13px;
  color: #FF6B7A;
  line-height: 1.5;
}

/* Toast */
.toast {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 20px);
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--green);
  color: #0A0A0A;
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 10px 20px;
  border-radius: 20px;
  transition: transform 0.25s ease;
  z-index: 1000;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* Scan again nudge */
.scan-again-btn {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  margin-top: 12px;
  -webkit-tap-highlight-color: transparent;
}

.scan-again-btn:active { background: var(--surface2); }


/* Mode tabs */
.mode-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 16px;
  gap: 4px;
}

.mode-tab {
  padding: 10px 8px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.mode-tab.active {
  background: var(--red);
  color: white;
}

.mode-tab svg { width: 15px; height: 15px; fill: currentColor; }

/* Manual lookup */
.manual-section { display: none; }
.manual-section.visible { display: block; }
.photo-section { display: block; }
.photo-section.hidden { display: none; }

.input-group {
  margin-bottom: 12px;
}

.input-label {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text3);
  margin-bottom: 6px;
  display: block;
}

.text-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}

.text-input:focus {
  border-color: var(--red);
}

.text-input::placeholder {
  color: var(--text3);
}

/* Divider label */
.divider {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text3);
  margin: 18px 0 10px;
}
</style>
</head>
<body>

<header class="app-header">
  <div class="hw-logo">
    <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
  </div>
  <div class="header-text">
    <div class="header-title">Hot Wheels Scanner</div>
    <div class="header-subtitle">AI-powered collector identifier</div>
  </div>
</header>

<main class="main" id="main">

  <div id="scan-section">

    <!-- Mode tabs -->
    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-photo" data-mode="photo">
        <svg viewBox="0 0 24 24"><path d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h4.05l1.83-2h4.24l1.83 2H20v12zM12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.65 0-3-1.35-3-3s1.35-3 3-3 3 1.35 3 3-1.35 3-3 3z"/></svg>
        Photo Scan
      </button>
      <button class="mode-tab" id="tab-manual" data-mode="manual">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12zM7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/></svg>
        Manual Lookup
      </button>
    </div>

    <!-- Photo scan mode -->
    <div class="photo-section" id="photo-section">
      <div class="divider">Photos</div>
      <div class="photo-row">
        <label class="photo-zone" id="zone-front" for="inp-front">
          <img class="preview" id="prev-front" style="display:none">
          <div class="zone-placeholder" id="ph-front">
            <div class="zone-icon">
              <svg viewBox="0 0 24 24"><path d="M12 15.2l-3.2-3.2 1.4-1.4 1.8 1.8V9h2v3.4l1.8-1.8 1.4 1.4L12 15.2zM20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h4.05l1.83-2h4.24l1.83 2H20v12z"/></svg>
            </div>
            <div class="zone-label">Front</div>
            <div class="zone-hint">Car face side</div>
          </div>
          <button class="remove-btn" id="rm-front" onclick="removePhoto('front', event)">×</button>
          <input type="file" id="inp-front" accept="image/*" capture="environment" onchange="handleUpload('front', this)" style="display:none">
        </label>

        <label class="photo-zone" id="zone-back" for="inp-back">
          <img class="preview" id="prev-back" style="display:none">
          <div class="zone-placeholder" id="ph-back">
            <div class="zone-icon">
              <svg viewBox="0 0 24 24"><path d="M12 15.2l-3.2-3.2 1.4-1.4 1.8 1.8V9h2v3.4l1.8-1.8 1.4 1.4L12 15.2zM20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h4.05l1.83-2h4.24l1.83 2H20v12z"/></svg>
            </div>
            <div class="zone-label">Back</div>
            <div class="zone-hint">Series &amp; info</div>
          </div>
          <button class="remove-btn" id="rm-back" onclick="removePhoto('back', event)">×</button>
          <input type="file" id="inp-back" accept="image/*" capture="environment" onchange="handleUpload('back', this)" style="display:none">
        </label>
      </div>

      <button class="scan-btn" id="scan-btn" onclick="scanCar()" disabled>
        <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:white"><path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M22 5h-6v6h6V5zm-6 8h1.5v1.5H16V13zm1.5 1.5H19V16h-1.5v-1.5zM19 13h1.5v1.5H19V13zm-3 3h1.5v1.5H16V16zm1.5 1.5H19V19h-1.5v-1.5zM19 16h1.5v1.5H19V16zm1.5-1.5H22V16h-1.5v-1.5zm0 3H22V19h-1.5v-1.5zM22 13h-1.5v1.5H22V13z"/></svg>
        Identify This Car
      </button>
    </div>

    <!-- Manual lookup mode -->
    <div class="manual-section" id="manual-section">
      <div class="divider">Car Details</div>

      <div class="input-group">

<script>

const PROXY_URL = 'https://calm-bread-a70e.steinke-oliver.workers.dev';

const imgs = { front: null, back: null };

function handleUpload(side, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    compressImage(e.target.result, 1600, 0.82, compressed => {
      imgs[side] = compressed;
      const prev = document.getElementById('prev-' + side);
      prev.src = compressed;
      prev.style.display = 'block';
      document.getElementById('ph-' + side).style.display = 'none';
      document.getElementById('rm-' + side).style.display = 'flex';
      document.getElementById('zone-' + side).classList.add('filled');
      updateScanBtn();
    });
  };
  reader.readAsDataURL(file);
}

function compressImage(dataUrl, maxPx, quality, callback) {
  const img = new Image();
  img.onload = () => {
    let w = img.width, h = img.height;
    if (w > maxPx || h > maxPx) {
      if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
      else { w = Math.round(w * maxPx / h); h = maxPx; }
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    const compressed = canvas.toDataURL('image/jpeg', quality);
    // If still over 4MB, compress harder
    const bytes = Math.round((compressed.length * 3) / 4);
    if (bytes > 4 * 1024 * 1024) {
      const canvas2 = document.createElement('canvas');
      canvas2.width = Math.round(w * 0.75); canvas2.height = Math.round(h * 0.75);
      canvas2.getContext('2d').drawImage(img, 0, 0, canvas2.width, canvas2.height);
      callback(canvas2.toDataURL('image/jpeg', 0.75));
    } else {
      callback(compressed);
    }
  };
  img.src = dataUrl;
}

function removePhoto(side, e) {
  e.preventDefault();
  e.stopPropagation();
  imgs[side] = null;
  document.getElementById('prev-' + side).style.display = 'none';
  document.getElementById('ph-' + side).style.display = 'flex';
  document.getElementById('rm-' + side).style.display = 'none';
  document.getElementById('zone-' + side).classList.remove('filled');
  document.getElementById('inp-' + side).value = '';

}

function updateScanBtn() {

async function scanCar() {

  document.getElementById('results-area').innerHTML = `

  document.getElementById('results-area').scrollIntoView({ behavior: 'smooth', block: 'start' });

  const content = [];
  if (imgs.front) {
    const b64 = imgs.front.split(',')[1];

  }
  if (imgs.back) {
    const b64 = imgs.back.split(',')[1];

  content.push({ type: 'text', text: `You are a Hot Wheels expert and collector. Carefully examine the package image(s).

  "collector_number": "Collector # like 097/250 or null",
  "model_name": "Car model/casting name",
  "series": "Series name or null",
  "series_number": "Position in series like 7/10 or null",
  "year_of_release": "4-digit year or null",
  "color": "Primary body color or null",
  "wheel_type": "Wheel type code like 5SP, PR5, DD8 or null",
  "is_treasure_hunt": true or false,
  "is_super_treasure_hunt": true or false,
  "is_new_model": true or false,
  "special_notes": "Tampo details, special markings, limited edition info. Be specific. null if nothing notable.",
  "market_value_low": estimated low price USD as number (loose/played condition),

  "market_value_high": estimated high price USD as number (carded, mint/sealed),

  try {
    const res = await fetch(PROXY_URL, {

      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{ role: 'user', content }]
      })
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error('Server error ' + res.status + ': ' + errText.slice(0, 500));
    }
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    const raw = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const car = JSON.parse(raw.replace(/```json|```/g, '').trim());
    renderResult(car);
  } catch (err) {
    document.getElementById('results-area').innerHTML =

  }

  btn.disabled = false;
  btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:white"><path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M22 5h-6v6h6V5zm-6 8h1.5v1.5H16V13zm1.5 1.5H19V16h-1.5v-1.5zM19 13h1.5v1.5H19V13zm-3 3h1.5v1.5H16V16zm1.5 1.5H19V19h-1.5v-1.5zM19 16h1.5v1.5H19V16zm1.5-1.5H22V16h-1.5v-1.5zm0 3H22V19h-1.5v-1.5zM22 13h-1.5v1.5H22V13z"/></svg> Identify This Car`;
}

function v(val) {

}

function switchMode(mode) {
  const photoSection = document.getElementById('photo-section');
  const manualSection = document.getElementById('manual-section');
  const tabPhoto = document.getElementById('tab-photo');
  const tabManual = document.getElementById('tab-manual');

  if (mode === 'photo') {
    photoSection.classList.remove('hidden');
    manualSection.classList.remove('visible');
    tabPhoto.classList.add('active');
    tabManual.classList.remove('active');
  } else {
    photoSection.classList.add('hidden');
    manualSection.classList.add('visible');
    tabPhoto.classList.remove('active');
    tabManual.classList.add('active');
  }
  document.getElementById('results-area').innerHTML = '';
}

function copyText(text) {
